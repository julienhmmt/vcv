---
name: Go

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: go-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  golangci-lint:
    name: Go lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read
      statuses: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: app/go.mod

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          # Pin for reproducible CI; bump deliberately.
          version: v2.12.2
          working-directory: app
          args: --timeout=3m

  build:
    name: Go build & test
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: app/go.mod
          cache: true

      - name: Verify dependencies
        run: go mod verify
        working-directory: app

      - name: Build
        run: go build -v ./...
        working-directory: app

      - name: Test with race detector and coverage
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...
        working-directory: app
        env:
          GO_TEST_ENVIRONMENT: 1
          LOG_LEVEL: INFO

      - name: Check coverage threshold
        run: |
          TOTAL=$(go tool cover -func=coverage.out | grep ^total: | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${TOTAL}%"
          if [ "$(echo "$TOTAL < 80" | bc)" -eq 1 ]; then
            echo "::error::Coverage ${TOTAL}% is below 80% threshold"
            exit 1
          fi
        working-directory: app
