version: 2

project_name: vcv

# Build the embedded Svelte bundle into app/web/dist before any go build,
# otherwise the binary serves an empty/stale UI (go:embed app/web/dist).
before:
  hooks:
    - sh -c "cd app/web/frontend && pnpm install --frozen-lockfile"
    - sh -c "cd app/web/frontend && pnpm build"

builds:
  - id: vcv
    dir: app
    main: ./cmd/server
    binary: vcv
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w -X vcv/internal/version.Version={{ .Version }}

archives:
  - id: vcv
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: "checksums.txt"

changelog:
  use: git
  sort: asc
  abbrev: -1
  groups:
    - title: "Features"
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: "Bug fixes"
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: "Performance"
      regexp: '^.*?perf(\(.+\))??!?:.+$'
      order: 2
    - title: "Refactoring"
      regexp: '^.*?refactor(\(.+\))??!?:.+$'
      order: 3
    - title: "Other"
      order: 999
  filters:
    exclude:
      - '^docs(\(.+\))?!?:'
      - '^test(\(.+\))?!?:'
      - '^chore(\(.+\))?!?:'
      - '^style(\(.+\))?!?:'
      - '^ci(\(.+\))?!?:'
      - '^build(\(.+\))?!?:'
      - '^Merge '

release:
  github:
    owner: julienhmmt
    name: vcv
