version: "3"

tasks:
  default: task --list

  web-install:
    desc: Install frontend dependencies (pnpm)
    dir: app/web/frontend
    cmds:
      - pnpm install

  web-dev:
    desc: Run Vite dev server (proxies /api + /i18n to Go on :52000)
    dir: app/web/frontend
    cmds:
      - pnpm dev

  web-build:
    desc: Build Svelte frontend to app/web/dist
    dir: app/web/frontend
    cmds:
      - pnpm build
      - touch ../dist/.gitkeep

  web-check:
    desc: svelte-check + tsc on frontend
    dir: app/web/frontend
    cmds:
      - pnpm check

  web-test:
    desc: Run frontend unit tests (vitest)
    dir: app/web/frontend
    cmds:
      - pnpm test

  web-test-coverage:
    desc: Run frontend unit tests with coverage
    dir: app/web/frontend
    cmds:
      - pnpm test:coverage

  dev:
    desc: Construit le binaire Go et le container docker
    vars:
      VCV_VERSION:
        sh: 'echo "dev-$(git rev-parse --short HEAD 2>/dev/null || echo unknown)"'
    cmds:
      - task: web-build
      - 'go clean -cache && go build -C app -ldflags="-X vcv/internal/version.Version={{.VCV_VERSION}}" -o ../vcv ./cmd/server'
      - rm -f vcv.log
      - touch vcv.log
      - docker compose -f docker-compose.dev.yml down
      - VCV_VERSION={{.VCV_VERSION}} docker compose -f docker-compose.dev.yml build
      - VCV_VERSION={{.VCV_VERSION}} docker compose -f docker-compose.dev.yml up -d

  docker-build:
    desc: Construit les images docker (arm64 et amd64) et push sur Docker Hub + GHCR
    vars:
      VCV_TAG:
        sh: "echo ${VCV_TAG:-latest}"
    cmds:
      # Requiert d'être connecté aux deux registres au préalable :
      #   docker login            (Docker Hub)
      #   docker login ghcr.io    (GitHub Container Registry, PAT write:packages)
      - docker buildx use vcv-builder
      - >-
        docker buildx build --platform linux/amd64,linux/arm64
        --build-arg VERSION={{.VCV_TAG}}
        -t jhmmt/vcv:{{.VCV_TAG}} -t jhmmt/vcv:latest
        -t ghcr.io/julienhmmt/vcv:{{.VCV_TAG}} -t ghcr.io/julienhmmt/vcv:latest
        --push ./app

  test-offline:
    desc: Run unit tests offline (no Vault) with coverage
    dir: app
    cmds:
      - "go test ./... -count=1 -coverprofile=coverage.out -covermode=atomic 2>&1 && go tool cover -func=coverage.out"

  test-dev:
    desc: Run tests against dev stack (docker-compose)
    dir: app
    cmds:
      - "VAULT_ADDR=http://localhost:8200 VAULT_TOKEN=root go test ./... -count=1 -coverprofile=coverage.out -covermode=atomic 2>&1 && go tool cover -func=coverage.out"

  go-update:
    desc: Update go version
    dir: app
    cmds:
      - go get -u all && go mod tidy -v && go clean -cache -v

  go-lint:
    desc: Run go fmt and go vet
    dir: app
    cmds:
      - go fmt ./... && go vet ./...

  go-coverage:
    desc: Run unit tests with coverage
    dir: app
    cmds:
      - "go test ./... -count=1 -coverprofile=coverage.out -covermode=atomic 2>&1 && go tool cover -func=coverage.out"
